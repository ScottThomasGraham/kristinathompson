<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Coming Soon</title>
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#0a0a0b" />
<link rel="icon" href="./favicon.svg" type="image/svg+xml" />
<link rel="preheader" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{ --ink:#0a0a0b; --gold:#d4af6a; --gilt:#e8d8b0; --bone:#f4f1ea; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    min-height:100%;
    background:radial-gradient(125% 95% at 50% 32%, #16140e 0%, #0a0a0b 58%, #050506 100%);
    color:var(--bone);
    font-family:"Cormorant Garamond", Georgia, serif;
    display:grid; place-items:center;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
    opacity:0; animation:fadein 1.8s ease forwards;
    transition:opacity .6s ease, filter .6s ease;
  }
  @keyframes fadein{ to{ opacity:1; } }
  body.unlock{ opacity:0; filter:blur(6px); }

  .frame{ position:fixed; inset:22px; border:1px solid rgba(212,175,106,.26); pointer-events:none; }
  .frame::after{ content:""; position:fixed; inset:27px; border:1px solid rgba(212,175,106,.09); }
  @media (max-width:540px){ .frame{ inset:14px; } .frame::after{ inset:18px; } }

  .wrap{ text-align:center; padding:2rem; position:relative; z-index:1; }
  .mark{ width:52px; height:52px; margin:0 auto 2.1rem; opacity:.92;
    animation:floaty 7s ease-in-out infinite; }
  @keyframes floaty{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-6px); } }
  .mark svg{ width:100%; height:100%; display:block; }
  .title{
    font-size:clamp(2.7rem, 9vw, 5.2rem);
    font-weight:500; letter-spacing:.05em; line-height:1;
    background:linear-gradient(180deg, #f7eed2 0%, #d4af6a 52%, #a8843f 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .rule{ width:0; height:1px; margin:1.7rem auto;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
    animation:grow 2.2s 1s cubic-bezier(.22,.61,.36,1) forwards; }
  @keyframes grow{ to{ width:min(300px,62vw); } }
  .sub{ font-family:"Inter", system-ui, sans-serif; font-size:.68rem;
    letter-spacing:.52em; text-transform:uppercase; color:rgba(212,175,106,.55);
    padding-left:.52em; }
  body.shake .wrap{ animation:sh .42s; }
  @keyframes sh{ 10%,90%{transform:translateX(-2px);} 30%,70%{transform:translateX(3px);} 50%{transform:translateX(-2px);} }

  /* invisible full-screen capture: tap/click anywhere to type the phrase */
  .key{ position:fixed; inset:0; width:100%; height:100%; z-index:2;
    opacity:0; border:0; background:transparent; color:transparent; caret-color:transparent;
    font-size:16px; /* prevents iOS zoom-on-focus */ }
  ::selection{ background:transparent; }
</style>
</head>
<body>
  <div class="frame" aria-hidden="true"></div>

  <form id="g" autocomplete="off" novalidate>
    <input id="k" class="key" type="text" autocomplete="off" autocapitalize="off"
           autocorrect="off" spellcheck="false" aria-hidden="true" tabindex="-1" enterkeyhint="go" />
  </form>

  <main class="wrap">
    <div class="mark" aria-hidden="true">
      <svg viewBox="0 0 100 100" fill="none" stroke="#d4af6a" stroke-width="1.3" stroke-linejoin="round">
        <path d="M50 6 C54 33 67 46 94 50 C67 54 54 67 50 94 C46 67 33 54 6 50 C33 46 46 33 50 6 Z"/>
        <circle cx="50" cy="50" r="2.6" fill="#d4af6a" stroke="none"/>
      </svg>
    </div>
    <div class="title">Coming&nbsp;Soon</div>
    <div class="rule" aria-hidden="true"></div>
    <div class="sub">MMXXVI</div>
  </main>

  <script>
    (function(){
      var inp = document.getElementById('k');
      var body = document.body;
      function focusKey(){ try { inp.focus({preventScroll:true}); } catch(e){ try{ inp.focus(); }catch(_){} } }
      // Focus only on a real gesture — no auto-popping keyboard, no hint on load.
      document.addEventListener('click', focusKey, true);
      document.addEventListener('touchend', focusKey, true);

      function norm(s){ return (s||'').toLowerCase().replace(/[^a-z0-9]/g,''); }
      async function hash16(s){
        var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
        return Array.prototype.map.call(new Uint8Array(buf), function(b){ return ('0'+b.toString(16)).slice(-2); }).join('').slice(0,16);
      }
      async function attempt(){
        var cand = norm(inp.value);
        inp.value = '';
        if (cand.length < 6) { return; }
        try {
          var h = await hash16(cand);
          var res = await fetch(h + '.html', { method:'HEAD', cache:'no-store' });
          if (res && res.ok) {
            body.classList.add('unlock');
            setTimeout(function(){ location.href = h + '.html'; }, 620);
            return;
          }
        } catch(e){ /* ignore */ }
        // wrong: silent, gentle shake (only ever seen by someone who already tried)
        body.classList.remove('shake'); void body.offsetWidth; body.classList.add('shake');
      }
      document.getElementById('g').addEventListener('submit', function(e){ e.preventDefault(); attempt(); });
    })();
  </script>
</body>
</html>
